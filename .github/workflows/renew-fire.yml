name: 🚀 续一次火

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
      timezone: "Asia/Shanghai"

jobs:
  run:
    runs-on: ubuntu-22.04
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-jammy
    timeout-minutes: 15

    steps:
      - name: 克隆当前仓库 (Clone current repo)
        uses: actions/checkout@v6

      - name: 安装 unzip (Install unzip)
        run: apt-get update && apt-get install -y unzip

      - name: 安装 Bun (Set up Bun)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装运行时依赖 (Install dependencies)
        run: bun install --production

      - name: 续一次火 (Run spark job)
        env:
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
          DOUYIN_TARGET_NAMES: ${{ secrets.DOUYIN_TARGET_NAMES }}
        run: bun src/main.ts

      - name: 发送失败邮件 (Send failure email)
        if: ${{ failure() }}
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.qq.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 抖音续火任务失败
          to: ${{ secrets.MAIL_ADDRESS }}
          from: ${{ secrets.MAIL_ADDRESS }}
          body: |
            抖音续火任务执行失败
            仓库：${{ github.repository }}
            运行链接：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

